<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Student Login - SpeakUp</title>
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(270deg, #ff6a00, #ee0979, #00c6ff);
      background-size: 600% 600%;
      animation: bg 12s ease infinite;
    }
    @keyframes bg {
      0%  { background-position: 0% }
      50% { background-position: 100% }
      100%{ background-position: 0% }
    }

    .login-box {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      color: white;
      animation: fadeUp 0.7s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .login-icon { font-size: 48px; margin-bottom: 8px; }
    .login-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-box .sub { font-size: 14px; opacity: 0.75; margin-bottom: 24px; }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      font-size: 16px;
      opacity: 0.7;
    }
    input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.25);
      outline: none;
      font-size: 15px;
      background: rgba(255,255,255,0.2);
      color: white;
      transition: border 0.2s;
      -webkit-appearance: none;
    }
    input::placeholder { color: rgba(255,255,255,0.7); }
    input:focus { border-color: rgba(255,255,255,0.7); }

    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      -webkit-appearance: none;
    }
    .btn-login:active { transform: scale(0.97); }

    .error-msg {
      background: rgba(255,60,60,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      border: 1px solid rgba(255,100,100,0.4);
    }

    .back-link {
      margin-top: 18px;
      font-size: 13px;
      opacity: 0.7;
    }
    .back-link a { color: white; }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-icon">🎓</div>
  <h2>Student Login</h2>
  <p class="sub">Enter your details to start practicing</p>

  <div class="input-group">
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input id="name" type="text" placeholder="Full Name" autocomplete="name" />
    </div>
    <div class="input-wrap">
      <span class="input-icon">🔑</span>
      <input id="pin" type="password" placeholder="PIN" inputmode="text" maxlength="12" />
    </div>
    <div class="input-wrap">
      <span class="input-icon">🏫</span>
      <input id="branch" type="text" placeholder="Branch / Class" />
    </div>
  </div>

  <button class="btn-login" onclick="loginStudent()">Enter →</button>
  <div class="error-msg" id="errorMsg"></div>

  <p class="back-link"><a href="index.html">← Back to Home</a></p>
</div>

<script>
function loginStudent() {
  const name   = document.getElementById("name").value.trim();
  const pin    = document.getElementById("pin").value.trim();
  const branch = document.getElementById("branch").value.trim();
  const err    = document.getElementById("errorMsg");

  if (!name || !pin || !branch) {
    err.style.display = "block";
    err.innerText = "⚠️ Please fill in all fields.";
    return;
  }
  if (pin.length < 4) {
    err.style.display = "block";
    err.innerText = "⚠️ PIN must be at least 4 digits.";
    return;
  }

  err.style.display = "none";
  localStorage.setItem("currentStudent", JSON.stringify({ name, pin, branch }));
  window.location.href = "student_dashboard.html";
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") loginStudent();
});
</script>
</body>
</html>
