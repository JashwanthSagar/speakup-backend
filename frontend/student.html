<!DOCTYPE html>
<html>
<head>
  <title>Student Login - SpeakUp</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(270deg, #ff6a00, #ee0979, #00c6ff);
      background-size: 600% 600%;
      animation: gradientMove 12s ease infinite;
    }
    @keyframes gradientMove {
      0%   { background-position: 0% }
      50%  { background-position: 100% }
      100% { background-position: 0% }
    }
    .login-box {
      background: rgba(255,255,255,0.15);
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      color: white;
      animation: fadeIn 1.5s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-box h2 { margin-bottom: 20px; }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
      background: rgba(255,255,255,0.2);
      color: white;
      box-sizing: border-box;
    }
    .login-box input::placeholder { color: rgba(255,255,255,0.8); }
    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .login-box button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255,255,255,0.6);
    }
    .error-msg {
      background: rgba(255,0,0,0.3);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>🎓 Student Login</h2>
  <input id="name"   placeholder="Full Name" />
  <input id="pin"    placeholder="PIN" type="password" />
  <input id="branch" placeholder="Branch" />
  <button onclick="loginStudent()">Enter →</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
function loginStudent() {
  const name   = document.getElementById("name").value.trim();
  const pin    = document.getElementById("pin").value.trim();
  const branch = document.getElementById("branch").value.trim();
  const errorMsg = document.getElementById("errorMsg");

  // Validation
  if (!name || !pin || !branch) {
    errorMsg.style.display = "block";
    errorMsg.innerText = "Please fill in all fields.";
    return;
  }
  if (pin.length < 12) {
    errorMsg.style.display = "block";
    errorMsg.innerText = "PIN must be at least 4 characters.";
    return;
  }

  errorMsg.style.display = "none";

  // Save to localStorage and navigate
  localStorage.setItem("currentStudent", JSON.stringify({ name, pin, branch }));
  window.location.href = "student_dashboard.html";
}

// Allow Enter key to submit
document.addEventListener("keydown", e => {
  if (e.key === "Enter") loginStudent();
});
</script>

</body>
</html>
