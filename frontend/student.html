<!DOCTYPE html>
<html>
<head>
  <title>Student Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-animate">

<div class="login-box">
  <h2>Student Login</h2>
  <input id="name" placeholder="Name">
  <input id="pin" placeholder="PIN">
  <input id="branch" placeholder="Branch">
  <button onclick="loginStudent()">Enter</button>
</div>

<script>
function loginStudent() {
  const name = document.getElementById("name").value;
  const pin = document.getElementById("pin").value;
  const branch = document.getElementById("branch").value;

  // store temporarily (not adding to list yet)
  localStorage.setItem("currentStudent", JSON.stringify({ name, pin, branch }));

  window.location.href = "student_dashboard.html";
}
</script>

</body>
</html>
