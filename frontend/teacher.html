<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Teacher Login - SpeakUp</title>
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(270deg, #00c6ff, #0072ff, #6a11cb);
      background-size: 600% 600%;
      animation: bg 12s ease infinite;
    }
    @keyframes bg {
      0%  { background-position: 0% }
      50% { background-position: 100% }
      100%{ background-position: 0% }
    }

    .login-box {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      color: white;
      animation: fadeUp 0.7s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .login-icon { font-size: 48px; margin-bottom: 8px; }
    .login-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-box .sub { font-size: 14px; opacity: 0.75; margin-bottom: 24px; }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      font-size: 16px;
      opacity: 0.7;
    }
    input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.25);
      outline: none;
      font-size: 15px;
      background: rgba(255,255,255,0.2);
      color: white;
      transition: border 0.2s;
      -webkit-appearance: none;
    }
    input::placeholder { color: rgba(255,255,255,0.7); }
    input:focus { border-color: rgba(255,255,255,0.7); }

    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      -webkit-appearance: none;
    }
    .btn-login:active { transform: scale(0.97); }

    .error-msg {
      background: rgba(255,60,60,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      border: 1px solid rgba(255,100,100,0.4);
    }
    .back-link { margin-top: 18px; font-size: 13px; opacity: 0.7; }
    .back-link a { color: white; }
    .note { font-size: 11px; opacity: 0.5; margin-top: 12px; }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-icon">👨‍🏫</div>
  <h2>Teacher Login</h2>
  <p class="sub">Access your dashboard</p>

  <div class="input-group">
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input id="username" type="text" placeholder="Username" autocomplete="username" />
    </div>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
    </div>
  </div>

  <button class="btn-login" onclick="loginTeacher()">Login →</button>
  <div class="error-msg" id="errorMsg">⚠️ Invalid username or password.</div>

  <p class="back-link"><a href="index.html">← Back to Home</a></p>
  <p class="note">Designed by Three Bencher's</p>
</div>

<script>
function loginTeacher() {
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();
  const err  = document.getElementById("errorMsg");

  if (!user || !pass) {
    err.style.display = "block";
    err.innerText = "⚠️ Please enter username and password.";
    return;
  }

  if (user === "Teja_Prathap" && pass === "Prathap@007") {
    localStorage.setItem("teacherLoggedIn", "true");
    window.location.href = "teacher_dashboard.html";
  } else {
    err.style.display = "block";
    err.innerText = "⚠️ Invalid username or password.";
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") loginTeacher();
});
</script>
</body>
</html>
