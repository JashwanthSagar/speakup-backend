<!DOCTYPE html>
<html>
<head>
  <title>Teacher Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(270deg, #141e30, #243b55, #6a11cb);
      background-size: 600% 600%;
      animation: bgMove 12s ease infinite;
      color: white;
    }

    @keyframes bgMove {
      0% { background-position: 0% }
      50% { background-position: 100% }
      100% { background-position: 0% }
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .logout {
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      background: #ff4b2b;
      color: white;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 85vh;
    }

    .card {
      width: 900px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
    }

    .stats {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .stat-box {
      padding: 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.2);
      text-align: center;
      width: 200px;
    }

    /* 🔥 Topic Box */
    .topic-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .topic-box input {
      padding: 10px;
      width: 60%;
      border-radius: 10px;
      border: none;
    }

    .topic-box button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-left: 10px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
    }

    th {
      background: rgba(255,255,255,0.3);
      padding: 10px;
    }

    td {
      padding: 10px;
      background: rgba(255,255,255,0.1);
    }

    tr:hover td {
      background: rgba(255,255,255,0.2);
    }

    audio {
      width: 100%;
    }

  </style>
</head>

<body>

<div class="header">
  <h2>Teacher Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">
  <div class="card">

    <!-- Stats -->
    <div class="stats">
      <div class="stat-box">
        <h3 id="audioCount">0</h3>
        <p>Total Audios</p>
      </div>
    </div>

    <!-- ✅ Topic Posting -->
    <div class="topic-box">
      <input id="newTopic" placeholder="Enter Topic">
      <button onclick="saveTopic()">Submit</button>
    </div>

    <!-- Audio Table -->
    <h3 style="text-align:center;">Student Recordings</h3>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>PIN</th>
          <th>Audio</th>
        </tr>
      </thead>
      <tbody id="audioList"></tbody>
    </table>

  </div>
</div>

<script>

const BACKEND_URL = "https://speakup-backend-1.onrender.com";

// ✅ Save topic
function saveTopic() {
  const topic = document.getElementById("newTopic").value;
  localStorage.setItem("topic", topic);
  alert("Topic saved!");
}

// 🔥 Load audios
async function loadAudios() {
  try {
    const res = await fetch(BACKEND_URL + "/audios");
    const data = await res.json();

    document.getElementById("audioCount").innerText = data.length;

    const rows = data.map(item => {
      return `
        <tr>
          <td>${item.name}</td>
          <td>${item.pin}</td>
          <td>
            <audio controls src="${BACKEND_URL}/uploads/${item.file}"></audio>
          </td>
        </tr>
      `;
    }).join("");

    document.getElementById("audioList").innerHTML = rows;

  } catch {
    document.getElementById("audioList").innerHTML =
      `<tr><td colspan="3">Error loading audios</td></tr>`;
  }
}

loadAudios();

// Logout
function logout() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
