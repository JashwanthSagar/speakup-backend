<!DOCTYPE html>
<html>
<head>
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-animate">

<div style="position:absolute; top:20px; right:20px;">
  <button onclick="logout()">Logout</button>
</div>

<div class="center">
  <h2>Teacher Dashboard</h2>

  <h3>Assign Topic</h3>
  <input id="newTopic" placeholder="Enter Topic">
  <button onclick="saveTopic()">Submit</button>

  <h3>Student List</h3>
  <ul id="list"></ul>

  <h3>Student Audios</h3>
  <ul id="audioList"></ul>
</div>

<script>

// 🔗 REPLACE WITH YOUR BACKEND URL
const BACKEND_URL = "https://YOUR-BACKEND-URL";

// Save topic
function saveTopic() {
  const topic = document.getElementById("newTopic").value;
  localStorage.setItem("topic", topic);
  alert("Topic saved!");
}

// Load students
let students = JSON.parse(localStorage.getItem("students")) || [];
document.getElementById("list").innerHTML =
  students.map(s => `<li>${s.name} - ${s.pin}</li>`).join("");

// Load audio files
async function loadAudios() {
  const res = await fetch(BACKEND_URL + "/audios");
  const files = await res.json();

  const list = files.map(f =>
    `<li><audio controls src="${BACKEND_URL}/${f}"></audio></li>`
  ).join("");

  document.getElementById("audioList").innerHTML = list;
}

loadAudios();

function logout() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
