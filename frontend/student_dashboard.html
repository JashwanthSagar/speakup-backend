<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard - SpeakUp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-animate">

<div class="container">
  <div class="card-main">

    <div class="header">
      <h2>SpeakUp 🎤</h2>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <h1 id="welcomeText" class="welcome">Welcome 👋</h1>

    <div class="topic-box">
      <h3>📚 Today's Topic</h3>
      <p id="topicText">Loading...</p>
    </div>

    <div class="status">
      <span id="dot"></span>
      <span id="statusText">Not Recording</span>
    </div>

    <h2 id="timer">00:00</h2>

    <div class="btns">
      <button id="startBtn" onclick="startRecording()">🎙 Start</button>
      <button id="stopBtn"  onclick="stopRecording()" disabled>⏹ Stop</button>
      <button id="submitBtn" onclick="submitAudio()" disabled>📤 Submit</button>
    </div>

    <audio id="audioPlayback" controls style="display:none;"></audio>

    <div class="speech-box">
      <h3>Your Speech 📝</h3>
      <p id="speechText">Your speech will appear here after recording...</p>
    </div>

    <div class="speech-box">
      <h3>Corrected Speech ✅</h3>
      <p id="correctedText">AI correction will appear here after you stop recording...</p>
    </div>

  </div>
</div>

<script>
const BACKEND_URL = "https://speakup-backend-1.onrender.com";

// ── Guard: redirect to login if not logged in ──
const student = JSON.parse(localStorage.getItem("currentStudent"));
if (!student) {
  window.location.href = "student.html";
}

document.getElementById("welcomeText").innerText = "Welcome, " + student.name + " 👋";

// ── Fetch today's topic from backend ──
async function loadTopic() {
  try {
    const res = await fetch(BACKEND_URL + "/get-topic");
    const data = await res.json();
    document.getElementById("topicText").innerText = data.topic || "No topic assigned yet";
  } catch {
    document.getElementById("topicText").innerText =
      localStorage.getItem("topic") || "No topic assigned yet";
  }
}
loadTopic();

// ── State ──
let mediaRecorder = null;
let audioChunks   = [];
let timerInterval = null;
let seconds       = 0;
let recognition   = null;
let finalTranscript = "";

// ── Speech Recognition setup ──
function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.continuous      = true;
  rec.interimResults  = true;
  rec.lang            = "en-IN";

  rec.onresult = function(event) {
    let interim = "";
    finalTranscript = "";
    // BUG FIX: only accumulate final results to avoid duplicates
    for (let i = 0; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript + " ";
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    document.getElementById("speechText").innerText =
      (finalTranscript + interim).trim() || "Listening...";
  };

  rec.onerror = function(e) {
    console.error("Speech recognition error:", e.error);
  };

  return rec;
}

// ── Start Recording ──
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioChunks      = [];
    finalTranscript  = "";
    seconds          = 0;

    document.getElementById("speechText").innerText    = "Listening...";
    document.getElementById("correctedText").innerText = "AI correction will appear after you stop...";
    document.getElementById("audioPlayback").style.display = "none";

    mediaRecorder = new MediaRecorder(stream);

    // BUG FIX: register onstop BEFORE calling start
    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      window.audioBlob = blob;
      const audioEl = document.getElementById("audioPlayback");
      audioEl.src = URL.createObjectURL(blob);
      audioEl.style.display = "block";
      // Enable submit only once blob is ready
      document.getElementById("submitBtn").disabled = false;
    };

    mediaRecorder.start();

    recognition = setupRecognition();
    if (recognition) recognition.start();

    // UI state
    document.getElementById("statusText").innerText = "Recording...";
    document.getElementById("dot").style.background = "red";
    document.getElementById("startBtn").disabled    = true;
    document.getElementById("stopBtn").disabled     = false;
    document.getElementById("submitBtn").disabled   = true;

    timerInterval = setInterval(() => {
      seconds++;
      const min = String(Math.floor(seconds / 60)).padStart(2, "0");
      const sec = String(seconds % 60).padStart(2, "0");
      document.getElementById("timer").innerText = min + ":" + sec;
    }, 1000);

    window.activeStream = stream;

  } catch (err) {
    alert("Microphone access is required to record. Please allow microphone permission and try again.");
    console.error("Mic error:", err);
  }
}

// ── Stop Recording ──
async function stopRecording() {
  // BUG FIX: guard against calling stop before start
  if (!mediaRecorder || mediaRecorder.state === "inactive") return;

  mediaRecorder.stop();
  clearInterval(timerInterval);

  if (window.activeStream) {
    window.activeStream.getTracks().forEach(t => t.stop());
  }
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }

  // UI state
  document.getElementById("statusText").innerText = "Stopped";
  document.getElementById("dot").style.background = "gray";
  document.getElementById("startBtn").disabled    = false;
  document.getElementById("stopBtn").disabled     = true;

  // Wait a moment for recognition to flush final results
  await new Promise(r => setTimeout(r, 600));

  const original = finalTranscript.trim();

  if (!original) {
    document.getElementById("speechText").innerText    = "No speech detected. Please try again.";
    document.getElementById("correctedText").innerText = "Nothing to correct.";
    return;
  }

  document.getElementById("speechText").innerText    = original;
  document.getElementById("correctedText").innerText = "Correcting...";

  // ── AI Grammar Correction ──
  try {
    const res = await fetch(BACKEND_URL + "/correct", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: original })
    });
    const data = await res.json();
    document.getElementById("correctedText").innerText = data.corrected || "No correction returned.";
  } catch (err) {
    console.error("AI correction error:", err);
    document.getElementById("correctedText").innerText = "Could not connect to AI. Check your internet.";
  }
}

// ── Submit Audio ──
async function submitAudio() {
  if (!window.audioBlob) {
    alert("Please record something first!");
    return;
  }

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled  = true;
  submitBtn.innerText = "Uploading...";

  const formData = new FormData();
  formData.append("audio", window.audioBlob, "recording.webm");
  formData.append("name", student.name);
  formData.append("pin",  student.pin);

  try {
    await fetch(BACKEND_URL + "/upload", {
      method: "POST",
      body: formData
    });
    submitBtn.innerText = "✅ Submitted!";
    alert("Recording submitted successfully! ✅");
  } catch {
    submitBtn.disabled  = false;
    submitBtn.innerText = "📤 Submit";
    alert("Upload failed. Please check your connection and try again. ❌");
  }
}

// ── Logout ──
function logout() {
  // BUG FIX: correct key name "currentStudent"
  localStorage.removeItem("currentStudent");
  window.location.href = "index.html";
}
</script>

</body>
</html>
