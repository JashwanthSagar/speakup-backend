<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakUp Dashboard</title>

<style>
/* ✅ YOUR ORIGINAL STYLE (UNCHANGED) */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;min-height:100vh;background:linear-gradient(270deg,#ff416c,#ff4b2b,#ff6a00);background-size:600% 600%;animation:bg 8s ease infinite;padding-bottom:40px}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;background:rgba(0,0,0,.15)}
.topbar h2{color:#fff}
.logout{background:rgba(255,255,255,.2);border:none;padding:8px 16px;border-radius:20px;color:#fff;cursor:pointer}
.content{padding:16px;max-width:500px;margin:auto}
.card{background:rgba(255,255,255,.15);padding:18px;border-radius:18px;color:#fff;margin-top:12px}
#micBtn{width:90px;height:90px;border-radius:50%;font-size:35px;border:none;cursor:pointer}
#micBtn.rec{background:red;color:white}
#micBtn.idle{background:#00c6ff;color:white}
</style>
</head>

<body>

<div class="topbar">
<h2>🎤 SpeakUp</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<div class="card">
<h3 id="welcome"></h3>
</div>

<div class="card">
<h4>📝 Your Speech</h4>
<div id="speechBox">Start speaking...</div>
</div>

<div class="card">
<h4>✅ Corrected Speech</h4>
<div id="corrBox">Waiting...</div>
</div>

<div class="card" style="text-align:center">
<button id="micBtn" class="idle" onclick="toggleRec()">🎙</button>
<br><br>
<button onclick="submitAudio()">Submit</button>
</div>

<audio id="player" controls style="width:100%;display:none"></audio>

</div>

<script>
const API="https://speakup-backend-1.onrender.com";

const student=JSON.parse(localStorage.getItem("currentStudent"));
document.getElementById("welcome").innerText="Welcome "+student.name;

// 🎤 Speech Recognition
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec,recActive=false,recText="";

function startSTT(){
  if(!SR)return;

  rec=new SR();
  rec.continuous=true;
  rec.interimResults=true;
  rec.lang="en-IN";

  rec.onresult=(e)=>{
    let text="";
    for(let i=0;i<e.results.length;i++){
      text+=e.results[i][0].transcript+" ";
    }
    recText=text;
    document.getElementById("speechBox").innerText=text;
  };

  rec.start();
}

// 🎤 Recording
let mediaRec,chunks=[],audioBlob;

async function startRec(){
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  chunks=[];

  mediaRec=new MediaRecorder(stream);

  mediaRec.ondataavailable=e=>chunks.push(e.data);

  mediaRec.onstop=()=>{
    audioBlob=new Blob(chunks,{type:"audio/webm"});
    const url=URL.createObjectURL(audioBlob);
    const p=document.getElementById("player");
    p.src=url;
    p.style.display="block";
  };

  mediaRec.start();
  startSTT();
  recActive=true;

  document.getElementById("micBtn").className="rec";
}

// 🛑 Stop
async function stopRec(){
  recActive=false;

  if(rec)rec.stop();
  mediaRec.stop();

  // 👉 If browser STT failed → use backend Whisper
  if(recText.length<3){
    await sendToWhisper();
  }else{
    await correctText(recText);
  }

  document.getElementById("micBtn").className="idle";
}

// 🔁 Toggle
function toggleRec(){
  recActive?stopRec():startRec();
}

// 🤖 Whisper API
async function sendToWhisper(){
  document.getElementById("speechBox").innerText="Transcribing...";

  const fd=new FormData();
  fd.append("audio",audioBlob,"audio.webm");

  const res=await fetch(API+"/transcribe",{method:"POST",body:fd});
  const data=await res.json();

  if(data.transcript){
    document.getElementById("speechBox").innerText=data.transcript;
    await correctText(data.transcript);
  }else{
    document.getElementById("speechBox").innerText="No speech detected";
  }
}

// ✨ Grammar Correction
async function correctText(text){
  document.getElementById("corrBox").innerText="Correcting...";

  const res=await fetch(API+"/correct",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });

  const data=await res.json();
  document.getElementById("corrBox").innerText=data.corrected||text;
}

// 📤 Upload
async function submitAudio(){
  if(!audioBlob)return alert("Record first");

  const fd=new FormData();
  fd.append("audio",audioBlob,"recording.webm");
  fd.append("name",student.name);
  fd.append("pin",student.pin);

  await fetch(API+"/upload",{method:"POST",body:fd});

  alert("Submitted ✅");
}

// 🚪 Logout
function logout(){
  localStorage.removeItem("currentStudent");
  location.href="index.html";
}
</script>

</body>
</html>
